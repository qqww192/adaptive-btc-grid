name: Daily News Alert

on:
  # ── Scheduled daily scan ─────────────────────────────────────────────────────
  # Runs every weekday morning. Adjust the time (UTC) to suit your timezone.
  #
  # Examples:
  #   '0 7 * * 1-5'    → Mon–Fri 07:00 UTC (08:00 BST / 09:00 CET)
  #   '30 6 * * 1-5'   → Mon–Fri 06:30 UTC
  #   '0 8 * * *'      → Every day including weekends at 08:00 UTC
  #
  # Note: markets are closed weekends, so weekday-only (1-5) is recommended.
  # GitHub Actions may delay runs by up to ~15 min during peak load.
  #
  schedule:
    - cron: '0 7 * * 1-5'   # ← CHANGE THIS — Mon–Fri 07:00 UTC

  # ── Manual trigger ────────────────────────────────────────────────────────────
  workflow_dispatch:

jobs:
  news-alert:
    name: Scan News → Alert
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily news alert
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python run_news_alert.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: alert-failure-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
