name: Fetch & Sync (No AI)

on:
  workflow_dispatch:   # manual trigger only

jobs:
  fetch-sync:
    name: T212 + yfinance → Google Sheet
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/review-and-rename-file-8yEKW

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch T212 & sync to sheet
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          cd src
          python fetch_and_sync.py
